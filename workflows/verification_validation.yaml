# Verification & Validation Workflow
# Comprehensive V&V workflow for scientific software.

name: verification_validation
description: Full verification and validation suite for numerical implementations
version: 1

triggers:
  - new_element_type
  - new_material_model
  - new_solver
  - pre_release
  - manual_trigger

stages:
  - id: code_verification
    name: "Code Verification"
    agent: test_verification
    description: "Verify that the code correctly solves the mathematical model"
    actions:
      - run_unit_tests
      - run_mms_studies
      - check_convergence_rates
      - verify_symmetry_properties
      - check_energy_conservation
    outputs:
      - unit_test_results
      - convergence_rates
      - symmetry_checks
      - energy_balance
    next: solution_verification

  - id: solution_verification
    name: "Solution Verification"
    agent: test_verification
    description: "Verify solution accuracy and assess numerical errors"
    actions:
      - run_grid_convergence_study
      - compute_richardson_extrapolation
      - assess_discretization_error
      - compute_gci  # Grid Convergence Index
    outputs:
      - discretization_error_bounds
      - gci_values
      - asymptotic_range_check
    next: tangent_verification

  - id: tangent_verification
    name: "Tangent Consistency Verification"
    agent: numerics
    description: "Verify all tangent operators are consistent with their residuals"
    actions:
      - finite_difference_tangent_check
      - test_multiple_load_states
      - test_near_singular_configurations
    outputs:
      - tangent_consistency_results
    constraints:
      - "‖F(u+εδu) - F(u) - εK·δu‖ / ‖εK·δu‖ → 0 as ε → 0 (Invariant #2)"
    next: regression

  - id: regression
    name: "Regression Testing"
    agent: test_verification
    actions:
      - run_full_regression_suite
      - compare_all_references
      - flag_any_deviations
    outputs:
      - regression_results
    next: report

  - id: report
    name: "V&V Report"
    agent: orchestrator
    actions:
      - compile_all_results
      - generate_vv_report
      - identify_remaining_gaps
      - log_to_performance
    outputs:
      - vv_report
      - gap_analysis

metadata:
  standards_reference: "ASME V&V 10-2006, V&V 20-2009"
  required_agents:
    - test_verification
    - numerics
    - orchestrator
