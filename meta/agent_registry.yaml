# Agent Registry — Defines agent roles, capabilities, and adaptation state
# This file is loaded by every agent session to understand the team topology.
# Updated by the metaprogramming system based on observed performance.

version: 1

agents:
  orchestrator:
    role: "Orchestrator"
    description: "Tech lead. Decomposes tasks, manages integration, governs architecture."
    capabilities:
      - task_decomposition
      - merge_conflict_resolution
      - architecture_governance
      - adr_approval
      - agent_dispatch
    mandatory_context:
      - docs/architecture/ARCHITECTURE.md
      - docs/architecture/INTERFACES.md
      - docs/architecture/INVARIANTS.md
      - docs/architecture/DECISIONS.md
      - meta/agent_registry.yaml
    tools:
      - tools/build_check.sh
      - tools/run_tests.sh
      - tools/invariant_check.py
      - tools/index_codebase.py
    branch_prefix: "orchestrator"
    adaptation_state:
      context_hits: {}      # files frequently retrieved → candidates for mandatory_context
      task_success_rate: 1.0
      avg_iterations: 0
      last_adapted: "2026-03-03"

