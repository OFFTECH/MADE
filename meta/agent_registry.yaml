      task_success_rate: 1.0
      avg_iterations: 0
      last_adapted: "2026-03-03"

# Dispatch rules — how the Orchestrator assigns agents to subtasks
dispatch_rules:
  - match_keywords: true    # Use specialization_keywords to route tasks
  - fallback: orchestrator  # If no specialist matches, Orchestrator handles it
  - parallel_threshold: 2   # Dispatch to parallel agents if task decomposes into 2+ independent subtasks
  - review_required: true   # Every completed task passes through Review agent

# Metaprogramming thresholds
adaptation_thresholds:
  pattern_codification: 3       # Successes before adding to PATTERNS.md
  context_promotion: 5          # Retrievals before adding to mandatory_context
  context_demotion: 20          # Tasks without retrieval before removing from mandatory_context
  performance_regression: 0.15  # Relative degradation triggering rollback alert
